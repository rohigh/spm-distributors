<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - SPM Distributors</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background-color: #f4f7f6; padding: 20px; }
    .admin-container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
    
    #login-screen { text-align: center; padding: 100px 20px; }
    #login-screen input { padding: 10px; font-size: 16px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
    th { background: #f8f9fa; font-weight: 600; color: #555; }
    .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-approved { background: #d4edda; color: #155724; }
    .status-rejected { background: #f8d7da; color: #721c24; }
    
    .btn-action { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; margin-right: 5px; }
    .btn-approve { background: #28a745; color: white; }
    .btn-reject { background: #dc3545; color: white; }
    .btn-view { background: #007bff; color: white; text-decoration: none; display: inline-block; }

    .delivery-days-section { margin-top: 40px; padding: 20px; background: #f8f9fa; border-radius: 8px; }
    .day-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div id="login-screen">
    <h2>Admin Login</h2>
    <input type="password" id="admin-pwd" placeholder="Enter Password">
    <button class="btn-primary" onclick="login()">Login</button>
  </div>

  <div class="admin-container" id="admin-dashboard" style="display: none;">
    <div class="admin-header">
      <h2>SPM Admin Dashboard</h2>
      <a href="index.html" style="color: #666; text-decoration: none;">&larr; Back to Store</a>
    </div>

    <!-- Orders Section -->
    <h3>Recent Orders</h3>
    <table>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Date</th>
          <th>Customer</th>
          <th>Total</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="orders-tbody">
        <tr><td colspan="6" style="text-align: center;">Loading orders...</td></tr>
      </tbody>
    </table>

    <!-- Delivery Days Settings -->
    <div class="delivery-days-section">
      <h3>🚚 Manage Delivery Days</h3>
      <p style="color: #666; font-size: 14px; margin-bottom: 15px;">Turn delivery on or off for specific days. Changes apply immediately for all customers.</p>
      <div id="days-container">
        <!-- Rendered by JS -->
      </div>
      <button class="btn-primary" style="margin-top: 15px;" onclick="saveDeliveryDays()">Save Delivery Days</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-init.js"></script>
  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
